name: Pull Latest Translations

on:
  workflow_dispatch:  # Allow manual triggering
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC

permissions:
  contents: write  # Allow pushing commits
  pull-requests: write  # Allow creating pull requests

jobs:
  pull-translations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
        
      - name: Get latest release info
        id: get_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest release info from the NTNH-Translations repo
          RELEASE_DATA=$(curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/NTNewHorizons/NTNH-Translations/releases/latest)
          
          # Check if we got valid data
          if echo "$RELEASE_DATA" | jq -e '.assets[0]' > /dev/null; then
            # Extract download URL for the asset (assuming it's a zip file)
            DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[0].browser_download_url')
            RELEASE_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
            
            echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
            echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
            
            echo "Latest release: $RELEASE_TAG"
            echo "Download URL: $DOWNLOAD_URL"
          else
            echo "Error: Could not fetch release data"
            echo "$RELEASE_DATA"
            exit 1
          fi
      
      - name: Download latest release
        run: |
          wget -O translations.zip "${{ steps.get_release.outputs.download_url }}"
          
      - name: Unpack translations
        run: |
          # Unzip the downloaded file into the root directory
          unzip -o translations.zip
          
          # Clean up the zip file
          rm translations.zip
          
      - name: Display unpacked contents
        run: |
          echo "Unpacked translation files:"
          find config -name "*.lang" -type f 2>/dev/null || echo "No .lang files found"
          
      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Create a new branch for the PR
            BRANCH_NAME="translations-update-$(date +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH_NAME"
            
            git commit -m "Update translations to ${{ steps.get_release.outputs.release_tag }}"
            git push origin "$BRANCH_NAME"
            
            # Create pull request
            gh pr create \
              --title "Update translations to ${{ steps.get_release.outputs.release_tag }}" \
              --body "Automated translation update from NTNH-Translations release ${{ steps.get_release.outputs.release_tag }}" \
              --base main \
              --head "$BRANCH_NAME"
          fi