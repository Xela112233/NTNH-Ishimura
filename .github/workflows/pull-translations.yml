name: Pull Latest Translations

on:
  workflow_dispatch:
  repository_dispatch:
    types: [translations-released]  # Triggered by daily-release.yml in NTNH-Translations

permissions:
  contents: write

jobs:
  pull-translations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout NTNH repository (updates/upcoming)
        uses: actions/checkout@v4
        with:
          ref: updates/upcoming
          token: ${{ secrets.UNIVERSAL_FINE }}
          fetch-depth: 0

      - name: Get latest release info from NTNH-Translations
        id: get_release
        env:
          GH_TOKEN: ${{ secrets.UNIVERSAL_FINE }}
        run: |
          RELEASE_DATA=$(curl -sf -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/NTNewHorizons/NTNH-Translations/releases/latest)

          # Find the asset whose name matches NTNH-Translations-XXXX-XX-XX.zip
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '
            .assets[]
            | select(.name | test("^NTNH-Translations-[0-9]{4}-[0-9]{2}-[0-9]{2}\\.zip$"))
            | .browser_download_url
          ' | head -n1)

          RELEASE_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "❌ No matching NTNH-Translations-XXXX-XX-XX.zip asset found in release $RELEASE_TAG"
            echo "$RELEASE_DATA" | jq '.assets[].name'
            exit 1
          fi

          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Found release: $RELEASE_TAG"
          echo "   URL: $DOWNLOAD_URL"

      - name: Download and extract translations ZIP
        env:
          GH_TOKEN: ${{ secrets.UNIVERSAL_FINE }}
        run: |
          curl -sf -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -o translations.zip \
            "${{ steps.get_release.outputs.download_url }}"

          echo "Extracting translations.zip..."
          unzip -o translations.zip -d translations_extracted

          echo ""
          echo "Extracted structure:"
          find translations_extracted -type f | head -30

      - name: Copy translations into NTNH config
        run: |
          if [ ! -d "translations_extracted/config" ]; then
            echo "❌ No config/ directory found inside the ZIP"
            exit 1
          fi

          echo "Copying translations_extracted/config/ → config/ ..."
          cp -rv translations_extracted/config/. config/

          echo ""
          echo "Changed files:"
          git status --short config/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add config

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            CHANGED=$(git diff --staged --name-only | wc -l)
            echo "Committing $CHANGED changed file(s)..."

            git commit -m "🌐 Update translations to ${{ steps.get_release.outputs.release_tag }}"
            git push origin updates/upcoming
            echo "✅ Pushed changes to updates/upcoming"
          fi

          # Cleanup
          rm -rf translations.zip translations_extracted
