name: Add Accepted Server to List

on:
  issues:
    types: [closed]

jobs:
  add-server:
    # state_reason is on the issue object: 'completed', 'not_planned', or 'duplicate'
    # Only 'completed' should trigger this — the exact match naturally excludes the others
    if: |
      github.event.issue.state_reason == 'completed' &&
      contains(toJson(github.event.issue.labels), 'Type: Unofficial Server')
    runs-on: ubuntu-latest

    steps:
      - name: Parse issue and update servers.json
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.UNIVERSAL_FINE }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body ?? '';

            // GitHub issue forms render fields as:
            // ### Field Label
            //
            // value
            const getField = (label) => {
              const regex = new RegExp(`### ${label}\\s*\\n+([^\\n#]+)`);
              const match = body.match(regex);
              return match ? match[1].trim() : null;
            };

            const ip   = getField('IP');
            const name = getField('Server Name');

            if (!ip || !name) {
              core.setFailed(`❌ Could not parse IP or Server Name from issue body.\n\nParsed body:\n${body}`);
              return;
            }

            core.info(`Adding server: "${name}" → ${ip}`);

            const owner = 'NTNewHorizons';
            const repo  = 'NTNewHorizons.github.io';
            const path  = 'servers.json';

            // Fetch existing servers.json (create fresh if it doesn't exist yet)
            let currentServers = {};
            let fileSha = undefined;

            try {
              const { data } = await github.rest.repos.getContent({ owner, repo, path });
              fileSha = data.sha;
              currentServers = JSON.parse(
                Buffer.from(data.content, 'base64').toString('utf-8')
              );
            } catch (e) {
              if (e.status === 404) {
                core.info('servers.json not found — will create it.');
              } else {
                throw e;
              }
            }

            // Guard: skip if the server IP is already in the list
            if (Object.values(currentServers).includes(ip)) {
              core.warning(`⚠️ Server IP "${ip}" is already in servers.json — skipping.`);
              return;
            }

            currentServers[name] = ip;

            const newContent = Buffer
              .from(JSON.stringify(currentServers, null, 2) + '\n')
              .toString('base64');

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: `feat: add server "${name}" (${ip}) [Issue #${issue.number}]`,
              content: newContent,
              sha: fileSha, // undefined = create new file
            });

            // Confirm on the issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                `✅ **${name}** (\`${ip}\`) has been automatically added to the server list!`,
                `The [servers.json](https://github.com/${owner}/${repo}/blob/main/${path}) file has been updated.`,
              ].join('\n'),
            });
